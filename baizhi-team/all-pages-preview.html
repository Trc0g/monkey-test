<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>百智团队方案 - 页面总览</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: #1f2937;
      background: #f3f6fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    }

    .viewer {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .switcher {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 64px;
      padding: 12px 18px;
      border-bottom: 1px solid #dfe4ee;
      background: rgba(255, 255, 255, .94);
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 26px rgba(31, 41, 55, .08);
    }

    .title {
      min-width: 168px;
      font-size: 16px;
      font-weight: 760;
      white-space: nowrap;
    }

    .buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      flex: 1;
    }

    .switch-btn {
      height: 38px;
      padding: 0 16px;
      border: 1px solid #dfe4ee;
      border-radius: 7px;
      color: #4b5563;
      background: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .16s ease, color .16s ease, border-color .16s ease, transform .12s ease;
    }

    .switch-btn:hover {
      border-color: #4258ff;
      color: #4258ff;
      background: #fbfcff;
    }

    .switch-btn.active {
      border-color: #4258ff;
      color: #fff;
      background: #4258ff;
    }

    .switch-btn:active {
      transform: translateY(1px);
    }

    .hint {
      min-width: 190px;
      color: #6b7280;
      font-size: 13px;
      text-align: right;
      white-space: nowrap;
    }

    .frame-wrap {
      min-height: 0;
      padding: 0;
    }

    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 64px);
      border: 0;
      background: #fff;
    }

    @media (max-width: 860px) {
      .switcher {
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
      }

      .title,
      .hint {
        min-width: 0;
        text-align: center;
      }

      iframe {
        height: calc(100vh - 132px);
      }
    }
  </style>
</head>
<body>
  <main class="viewer">
    <header class="switcher">
      <div class="title">百智团队方案</div>
      <div class="buttons" aria-label="页面切换">
        <button class="switch-btn active" type="button" data-page="login">团队登录</button>
        <button class="switch-btn" type="button" data-page="permission">无权限申请</button>
        <button class="switch-btn" type="button" data-page="team">团队管理</button>
        <button class="switch-btn" type="button" data-page="workbench">工作台团队管理</button>
      </div>
      <div class="hint" id="currentName">当前：团队登录</div>
    </header>
    <section class="frame-wrap">
      <iframe id="previewFrame" title="页面预览"></iframe>
    </section>
  </main>

<template id="tpl-login">
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>长亭百智云平台 - 团队用户登录</title>
  <style>
    :root {
      --brand: #4258ff;
      --brand-deep: #2f43e8;
      --brand-soft: #eef3ff;
      --text: #1f2937;
      --muted: #6b7280;
      --subtle: #9ca3af;
      --line: #dfe4ee;
      --panel: rgba(255, 255, 255, .94);
      --field: #fbfcff;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: 0 24px 70px rgba(58, 83, 180, .18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      background:
        radial-gradient(circle at 76% 18%, rgba(238, 243, 255, .92) 0 18%, transparent 43%),
        radial-gradient(circle at 71% 72%, rgba(108, 168, 255, .30) 0 16%, transparent 34%),
        linear-gradient(116deg, #f9fbff 0%, #f2f6ff 42%, #eaf2ff 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 980px;
      height: 520px;
      right: -180px;
      bottom: -86px;
      border-radius: 52% 48% 44% 56%;
      border: 34px solid rgba(255, 255, 255, .72);
      box-shadow:
        inset 0 0 42px rgba(123, 174, 255, .18),
        0 0 54px rgba(99, 149, 255, .20);
      transform: rotate(-17deg);
    }

    body::after {
      width: 760px;
      height: 420px;
      right: 120px;
      bottom: 8px;
      border-radius: 52% 48% 44% 56%;
      border: 22px solid rgba(205, 225, 255, .58);
      filter: blur(.2px);
      transform: rotate(-21deg);
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(420px, 1fr) minmax(440px, 560px);
      align-items: center;
      gap: 78px;
      width: min(1240px, calc(100vw - 96px));
      margin: 0 auto;
      padding: 64px 0 50px;
    }

    .brand-area {
      min-width: 0;
      transform: translateY(-8px);
    }

    .brand-line {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--brand);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .2px;
      margin-bottom: 56px;
    }

    .bot-mark {
      width: 24px;
      height: 18px;
      border: 2px solid currentColor;
      border-radius: 999px;
      position: relative;
      display: inline-block;
    }

    .bot-mark::before {
      content: "";
      position: absolute;
      left: 4px;
      top: -6px;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 9px 0 0 currentColor;
    }

    .bot-mark::after {
      content: "";
      position: absolute;
      left: 6px;
      top: 6px;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 8px 0 0 currentColor;
    }

    h1 {
      margin: 0;
      font-size: clamp(48px, 5vw, 76px);
      line-height: 1.12;
      font-weight: 750;
      letter-spacing: 0;
    }

    .tagline {
      margin-top: 26px;
      font-size: clamp(20px, 2.1vw, 26px);
      font-weight: 500;
      letter-spacing: 3px;
    }

    .login-card {
      position: relative;
      width: 440px;
      min-height: 550px;
      justify-self: center;
      padding: 39px 40px 34px;
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .qr-corner {
      position: absolute;
      top: 0;
      right: 0;
      width: 76px;
      height: 76px;
      border: 0;
      background:
        linear-gradient(135deg, transparent 0 49%, #f1f4fa 50% 100%);
      color: var(--brand);
      cursor: pointer;
    }

    .qr-corner svg {
      position: absolute;
      top: 17px;
      right: 17px;
      width: 24px;
      height: 24px;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
      animation: fadeIn .18s ease-out;
    }

    .login-card.team-active .qr-corner {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      margin: 0 0 30px;
      text-align: center;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 750;
    }

    .back-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: -9px 0 24px;
    }

    .back-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      padding: 4px 0;
    }

    .back-btn:hover {
      color: var(--brand);
    }

    .form {
      display: grid;
      gap: 20px;
    }

    .field {
      display: grid;
      gap: 9px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .input-wrap .icon {
      position: absolute;
      left: 15px;
      width: 18px;
      height: 18px;
      color: #a3adbd;
      pointer-events: none;
    }

    input {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--field);
      color: var(--text);
      font-size: 14px;
      outline: none;
      padding: 0 14px 0 42px;
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }

    input::placeholder {
      color: #a3aab7;
    }

    input:focus {
      border-color: var(--brand);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(66, 88, 255, .10);
    }

    .inline-inputs {
      display: grid;
      grid-template-columns: 1fr 104px;
      gap: 8px;
    }

    .ghost-btn,
    .primary-btn,
    .provider-btn,
    .team-entry {
      height: 48px;
      border-radius: 6px;
      border: 1px solid var(--brand);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .12s ease, background .16s ease, border-color .16s ease, color .16s ease;
    }

    .ghost-btn {
      color: var(--brand);
      background: #fff;
    }

    .ghost-btn:hover,
    .team-entry:hover {
      background: var(--brand-soft);
    }

    .primary-btn {
      width: 100%;
      color: #fff;
      background: var(--brand);
      border-color: var(--brand);
    }

    .primary-btn:hover {
      background: var(--brand-deep);
      border-color: var(--brand-deep);
    }

    .primary-btn:active,
    .ghost-btn:active,
    .provider-btn:active,
    .team-entry:active {
      transform: translateY(1px);
    }

    .agreement {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 21px 0 22px;
      color: #4b5563;
      font-size: 13px;
    }

    .agreement input {
      width: 16px;
      height: 16px;
      accent-color: var(--brand);
      padding: 0;
    }

    a {
      color: var(--brand);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 14px;
      color: #9aa2b1;
      font-size: 12px;
      margin-top: 6px;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      background: var(--line);
    }

    .social-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      margin: 24px 0 18px;
    }

    .social {
      width: 24px;
      height: 24px;
      border: 0;
      background: transparent;
      padding: 0;
      display: inline-grid;
      place-items: center;
      cursor: pointer;
    }

    .social svg {
      width: 22px;
      height: 22px;
    }

    .team-entry {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      color: var(--brand);
      background: #fff;
    }

    .team-entry svg {
      width: 18px;
      height: 18px;
    }

    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .helper {
      margin: -6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .slug-actions {
      display: grid;
      grid-template-columns: 1fr 112px;
      gap: 8px;
    }

    .result-panel {
      display: none;
      gap: 18px;
      margin-top: 20px;
    }

    .result-panel.active {
      display: grid;
    }

    .login-type-select {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      font-weight: 650;
      outline: none;
      padding: 0 12px;
    }

    .login-type-select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(66, 88, 255, .10);
    }

    .method-section {
      display: none;
    }

    .method-section.active {
      display: grid;
      gap: 20px;
    }

    .provider-list {
      display: grid;
      gap: 10px;
      margin-top: -2px;
    }

    .provider-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      height: auto;
      min-height: 54px;
      padding: 10px 14px;
      color: var(--text);
      background: #fff;
      border-color: var(--line);
      text-align: left;
    }

    .provider-btn:hover {
      border-color: var(--brand);
      background: #fbfcff;
    }

    .provider-main {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
    }

    .provider-mark {
      width: 30px;
      height: 30px;
      flex: 0 0 30px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      background: var(--brand);
    }

    .provider-name {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 750;
    }

    .provider-desc {
      display: block;
      margin-top: 1px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .status.ok {
      color: var(--success);
    }

    .status.error {
      color: var(--danger);
    }

    .footer {
      position: fixed;
      z-index: 1;
      left: 0;
      right: 0;
      bottom: 26px;
      color: rgba(92, 101, 122, .54);
      text-align: center;
      font-size: 12px;
    }

    @media (max-width: 980px) {
      .page {
        grid-template-columns: 1fr;
        gap: 34px;
        width: min(520px, calc(100vw - 32px));
        padding: 36px 0 76px;
      }

      .brand-area {
        transform: none;
      }

      .brand-line {
        margin-bottom: 24px;
      }

      h1 {
        font-size: 44px;
      }

      .tagline {
        margin-top: 16px;
        font-size: 19px;
        letter-spacing: 2px;
      }

      .login-card {
        width: 100%;
      }
    }

    @media (max-width: 520px) {
      .page {
        width: calc(100vw - 24px);
        padding-top: 26px;
      }

      h1 {
        font-size: 36px;
      }

      .login-card {
        padding: 34px 18px 26px;
      }

      .inline-inputs,
      .slug-actions {
        grid-template-columns: 1fr;
      }

      .social-row {
        gap: 22px;
      }

      .footer {
        position: static;
        padding: 0 12px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="brand-area" aria-label="产品信息">
      <div class="brand-line">
        <span class="bot-mark" aria-hidden="true"></span>
        <span>长亭百智云 · Baizhi.Cloud</span>
      </div>

        <label class="agreement">

        <div class="divider">其他登录方式</div>
        <div class="social-row" aria-label="其他登录方式">
          <button class="social" type="button" aria-label="支付宝登录">

              <path d="M7.1 14.4c3.3.3 6.4 1.2 9.8 3.4" fill="none" stroke="#fff" stroke-width="1.55" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="social" type="button" aria-label="抖音登录">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="2" y="2" width="20" height="20" rx="5" fill="#111827"/>
              <path d="M14.2 5.6c.4 2.1 1.6 3.2 3.7 3.5v2.7c-1.3 0-2.5-.4-3.6-1.1v4.1a4 4 0 1 1-4.1-4v2.7a1.4 1.4 0 1 0 1.3 1.4V5.6h2.7Z" fill="#fff"/>
              <path d="M14.2 5.6c.2 1 .6 1.8 1.2 2.4" fill="none" stroke="#2de2e6" stroke-width="1.2"/>
              <path d="M8.9 12.8a4 4 0 0 0-2.1 3.5" fill="none" stroke="#ff2d55" stroke-width="1.2"/>
            </svg>
          </button>
          <button class="social" type="button" aria-label="GitHub 登录">
            <svg viewBox="0 0 24 24" fill="#24292f" aria-hidden="true">
              <path d="M12 2.6a9.4 9.4 0 0 0-3 18.3c.5.1.7-.2.7-.5v-1.8c-2.8.6-3.4-1.2-3.4-1.2-.5-1.1-1.1-1.4-1.1-1.4-.9-.6.1-.6.1-.6 1 0 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.6.3-1.1.6-1.3-2.2-.3-4.6-1.1-4.6-4.7 0-1 .4-1.9 1-2.6-.1-.2-.4-1.3.1-2.6 0 0 .8-.3 2.7 1a9.2 9.2 0 0 1 5 0c1.9-1.3 2.7-1 2.7-1 .5 1.3.2 2.4.1 2.6.6.7 1 1.6 1 2.6 0 3.7-2.4 4.5-4.6 4.7.4.3.7.9.7 1.8v2.7c0 .3.2.6.7.5A9.4 9.4 0 0 0 12 2.6Z"/>
            </svg>
          </button>
          <button class="social" type="button" aria-label="微信登录">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="10" cy="10.5" r="6.7" fill="#111827"/>
              <circle cx="15.4" cy="14.3" r="5.6" fill="#7ddf64" stroke="#fff" stroke-width="1"/>
              <circle cx="7.8" cy="9.7" r=".75" fill="#fff"/>
              <circle cx="11.7" cy="9.7" r=".75" fill="#fff"/>
              <circle cx="13.5" cy="13.7" r=".65" fill="#1f2937"/>
              <circle cx="17" cy="13.7" r=".65" fill="#1f2937"/>
            </svg>
          </button>
        </div>

        <form class="form" id="teamLookupForm" onsubmit="return false;">
          <div class="field">
            <label for="teamSlug">团队 ID</label>
            <div class="slug-actions">
              <div class="input-wrap">
                <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M5 20V6.8c0-.9.7-1.6 1.6-1.6h6.8c.9 0 1.6.7 1.6 1.6V20M3.5 20h17M8.2 9h3.6M8.2 12.4h3.6M8.2 15.8h3.6M15 10h2.7c.7 0 1.3.6 1.3 1.3V20" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>

            <div class="field">
              <div class="input-wrap">
                <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4.5 6.5h15v11h-15v-11Zm.8 1.1 6.7 5 6.7-5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <input id="teamEmail" type="email" placeholder="请输入团队邮箱" autocomplete="email" />
              </div>
            </div>

            <div class="field" id="credentialField">
              <div class="inline-inputs" id="codeRow">
                <div class="input-wrap">
                  <input id="teamCode" type="text" placeholder="请输入邮箱验证码" autocomplete="one-time-code" />
                </div>
                <button class="ghost-btn" type="button">获取验证码</button>
              </div>
            </div>

            <button class="primary-btn" id="teamEmailLogin" type="submit">登录团队空间</button>
          </form>

          <section class="method-section" id="ssoMethod">
            <p class="helper" id="ssoHelper">选择后将跳转到对应身份认证页面。</p>

  <script>
    const loginCard = document.querySelector(".login-card");
    const phonePanel = document.querySelector("#phonePanel");
    const teamPanel = document.querySelector("#teamPanel");
    const openTeamLogin = document.querySelector("#openTeamLogin");
    const backPhone = document.querySelector("#backPhone");
    const teamSlug = document.querySelector("#teamSlug");
    const lookupTeam = document.querySelector("#lookupTeam");
    const lookupStatus = document.querySelector("#lookupStatus");
    const teamLoginResult = document.querySelector("#teamLoginResult");
    const loginTypeField = document.querySelector("#loginTypeField");
    const loginType = document.querySelector("#loginType");
    const emailMethod = document.querySelector("#emailMethod");
    const ssoMethod = document.querySelector("#ssoMethod");
    const ssoHelper = document.querySelector("#ssoHelper");
    const providerList = document.querySelector("#providerList");

    const teamAuthConfig = {
      chaitin: {
        methods: [
          { id: "email", label: "邮箱登录", kind: "email" },
          { id: "wecom", label: "企业微信登录", kind: "provider", name: "企业微信", type: "企业微信", mark: "企", url: "https://sso.example.com/chaitin/wecom" },
          { id: "oauth", label: "Oauth 登录", kind: "provider", name: "Oauth 登录", type: "Oauth", mark: "O", url: "https://sso.example.com/chaitin/oauth" }
        ]
      },
      baizhi: {
        methods: [
          { id: "wecom", label: "企业微信登录", kind: "provider", name: "企业微信", type: "企业微信", mark: "企", url: "https://sso.example.com/baizhi/wecom" },
          { id: "oauth", label: "Oauth 登录", kind: "provider", name: "Oauth 登录", type: "Oauth", mark: "O", url: "https://sso.example.com/baizhi/oauth" }
        ]
      },
      demo: {
        methods: [
          { id: "email", label: "邮箱登录", kind: "email" }
        ]
      }
    };

    function showPanel(panel) {
      phonePanel.classList.toggle("active", panel === "phone");
      teamPanel.classList.toggle("active", panel === "team");
      loginCard.classList.toggle("team-active", panel === "team");
    }

    function renderProvider(method, slug) {
      providerList.innerHTML = "";
      const button = document.createElement("button");
      button.className = "provider-btn";
      button.type = "button";
      button.innerHTML = `
        <span class="provider-main">
          <span class="provider-mark">${method.mark}</span>
          <span>
            <span class="provider-name">${method.label}</span>
            <span class="provider-desc">${method.type} · ${slug}</span>
          </span>
        </span>
        <span aria-hidden="true">跳转 →</span>
      `;
      button.addEventListener("click", () => {
        lookupStatus.className = "status ok";
        lookupStatus.textContent = `即将跳转到 ${method.label}：${method.url}`;
      });
      providerList.appendChild(button);
    }

    function getCurrentTeamConfig() {
      return teamAuthConfig[teamSlug.value.trim().toLowerCase()];
    }

    function setVisibleMethod(methodId) {
      const config = getCurrentTeamConfig();
      const method = config?.methods.find((item) => item.id === methodId);
      const isEmail = method?.kind === "email";
      emailMethod.classList.toggle("active", isEmail);
      ssoMethod.classList.toggle("active", Boolean(method && !isEmail));

      if (method && !isEmail) {
        ssoHelper.textContent = `使用${method.label}，将跳转到对应身份认证页面。`;
        renderProvider(method, teamSlug.value.trim().toLowerCase());
      }
    }

    function renderLoginTypeOptions(config, slug) {
      const methods = config.methods;
      loginType.innerHTML = "";
      loginTypeField.style.display = methods.length > 1 ? "grid" : "none";

      methods.forEach((method) => {
        loginType.add(new Option(method.label, method.id));
      });

      loginType.value = methods[0].id;
      setVisibleMethod(methods[0].id);
    }

    function lookupTeamAuth() {
      const slug = teamSlug.value.trim().toLowerCase();
      providerList.innerHTML = "";
      teamLoginResult.classList.remove("active");

      if (!slug) {
        lookupStatus.className = "status error";
        lookupStatus.textContent = "请先输入团队 ID。";
        return;
      }

      const config = teamAuthConfig[slug];
      if (!config || !config.methods.length) {
        lookupStatus.className = "status error";
        lookupStatus.textContent = `未查询到团队 ID ${slug} 可用的团队登录方式。`;
        return;
      }

      lookupStatus.className = "status";
      lookupStatus.textContent = "";
      teamLoginResult.classList.add("active");
      renderLoginTypeOptions(config, slug);
    }

    openTeamLogin.addEventListener("click", () => showPanel("team"));
    backPhone.addEventListener("click", () => showPanel("phone"));
    lookupTeam.addEventListener("click", lookupTeamAuth);
    teamSlug.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        lookupTeamAuth();
      }
    });
    loginType.addEventListener("change", () => setVisibleMethod(loginType.value));
    document.querySelector("#teamEmailLogin").addEventListener("click", () => {
      const slug = teamSlug.value.trim();
      const email = document.querySelector("#teamEmail").value.trim();
      if (!slug || !email) {
        alert("请输入团队 ID 和团队邮箱。");
        return;
      }
      alert(`提交团队邮箱登录：${slug} / ${email}`);
    });
  </script>
</body>
</html>

    const reasonCount = document.querySelector("#reasonCount");
    const status = document.querySelector("#status");
    const submitBtn = document.querySelector("#submitBtn");
    const backBtn = document.querySelector("#backBtn");

    reason.addEventListener("input", () => {
      reasonCount.textContent = reason.value.length;
      status.className = "status";
      status.textContent = "";
    });

    submitBtn.addEventListener("click", () => {
      const value = reason.value.trim();
      if (value.length < 8) {
        status.className = "status error";
        status.textContent = "请填写不少于 8 个字的申请理由。";
        reason.focus();
        return;

      submitBtn.disabled = true;

  <script>
    const drawerMask = document.getElementById("drawerMask");
    const openDrawer = document.getElementById("openDrawer");
    const closeDrawer = document.getElementById("closeDrawer");
    const cancelDrawer = document.getElementById("cancelDrawer");
    const form = document.getElementById("teamForm");
    const rows = document.getElementById("teamRows");
    const toast = document.getElementById("toast");
    const detailMask = document.getElementById("detailMask");
    const closeDetail = document.getElementById("closeDetail");
    const cancelDetail = document.getElementById("cancelDetail");
    const saveDetail = document.getElementById("saveDetail");
    const memberRows = document.getElementById("memberRows");
    const successMask = document.getElementById("successMask");
    const successEmail = document.getElementById("successEmail");
    const closeSuccess = document.getElementById("closeSuccess");
    let currentDetailRow = null;
    let currentDetailSlug = "";

    const detailFields = {
      nameText: document.getElementById("detailNameText"),
      nameInput: document.getElementById("detailNameInput"),
      slug: document.getElementById("detailSlug"),
      adminAccountText: document.getElementById("detailAdminAccountText"),
      adminAccountInput: document.getElementById("detailAdminAccountInput"),
      members: document.getElementById("detailMembers"),
      seatLimitText: document.getElementById("detailSeatLimitText"),
      seatLimitInput: document.getElementById("detailSeatLimitInput"),
      points: document.getElementById("detailPoints"),
      createdAt: document.getElementById("detailCreatedAt"),
      status: document.getElementById("detailStatus"),
      remarkText: document.getElementById("detailRemarkText"),
      remarkInput: document.getElementById("detailRemarkInput")
    };

    const teamMembers = {
      "team-core": [
        { name: "张明", joinedAt: "2026-05-08", role: "管理员", id: "mem-core-001" },
        { name: "李雪", joinedAt: "2026-05-09", role: "成员", id: "mem-core-002" },
        { name: "周航", joinedAt: "2026-05-10", role: "成员", id: "mem-core-003" }
      ],
      "team-solution": [
        { name: "王琳", joinedAt: "2026-04-26", role: "管理员", id: "mem-sol-001" },
        { name: "刘洋", joinedAt: "2026-04-27", role: "成员", id: "mem-sol-002" },
        { name: "陈思", joinedAt: "2026-04-29", role: "成员", id: "mem-sol-003" }
      ],
      "cs-delivery": [
        { name: "赵强", joinedAt: "2026-03-19", role: "管理员", id: "mem-cs-001" },
        { name: "何敏", joinedAt: "2026-03-22", role: "成员", id: "mem-cs-002" },
        { name: "孙越", joinedAt: "2026-03-25", role: "成员", id: "mem-cs-003" }
      ]
    };

    const adminAccounts = {
      "team-core": "zhangming@baizhi.cloud",
      "team-solution": "wanglin@baizhi.cloud",
      "cs-delivery": "zhaoqiang@baizhi.cloud"
    };

    function showDrawer() {
      drawerMask.classList.add("open");
      drawerMask.setAttribute("aria-hidden", "false");
    }

    function hideDrawer() {
      drawerMask.classList.remove("open");
      drawerMask.setAttribute("aria-hidden", "true");
    }

    function showDetailDrawer() {
      detailMask.classList.add("open");
      detailMask.setAttribute("aria-hidden", "false");
    }

    function hideDetailDrawer() {
      detailMask.classList.remove("open");
      detailMask.setAttribute("aria-hidden", "true");
    }

    function showSuccessModal(email) {
      successEmail.textContent = email;
      successMask.classList.add("open");
      successMask.setAttribute("aria-hidden", "false");
    }

    function hideSuccessModal() {
      successMask.classList.remove("open");
      successMask.setAttribute("aria-hidden", "true");
    }

    function closeInlineEditors() {
      detailMask.querySelectorAll(".editable-value.editing").forEach(item => {
        item.classList.remove("editing");
      });
    }

    function renderMembers(slug) {
      const members = teamMembers[slug] || [];
      memberRows.innerHTML = members.map(member => `
        <tr>
          <td>${member.name}</td>
          <td>${member.joinedAt}</td>
          <td>${member.role}</td>
          <td>${member.id}</td>
        </tr>
      `).join("");
    }

    function getTeamLink(slug) {
      const baseUrl = `${window.location.origin}${window.location.pathname}`;
      return `${baseUrl}?team=${encodeURIComponent(slug)}`;
    }

    function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }
      const input = document.createElement("textarea");
      input.value = text;
      input.style.position = "fixed";
      input.style.opacity = "0";
      document.body.appendChild(input);
      input.focus();
      input.select();
      document.execCommand("copy");
      input.remove();
      return Promise.resolve();
    }

    openDrawer.addEventListener("click", showDrawer);
    closeDrawer.addEventListener("click", hideDrawer);
    cancelDrawer.addEventListener("click", hideDrawer);
    drawerMask.addEventListener("click", event => {
      if (event.target === drawerMask) hideDrawer();
    });
    closeDetail.addEventListener("click", hideDetailDrawer);
    cancelDetail.addEventListener("click", hideDetailDrawer);
    detailMask.addEventListener("click", event => {
      if (event.target === detailMask) hideDetailDrawer();
    });
    closeSuccess.addEventListener("click", hideSuccessModal);
    successMask.addEventListener("click", event => {
      if (event.target === successMask) hideSuccessModal();
    });
    detailMask.addEventListener("click", event => {
      const editButton = event.target.closest(".edit-icon");
      if (!editButton) return;
      const editable = editButton.closest(".editable-value");
      editable.classList.add("editing");
      const input = editable.querySelector(".edit-inline");
      input.focus();
      input.select();
    });

    rows.addEventListener("click", event => {
      if (event.target.classList.contains("copy-link")) {
        const row = event.target.closest("tr");
        const slug = row.children[1].textContent.trim();
        copyText(getTeamLink(slug)).then(() => {
          toast.textContent = "团队链接已复制";
          toast.classList.add("show");
          setTimeout(() => toast.classList.remove("show"), 1800);
        });
        return;
      }

      if (!event.target.classList.contains("view-team")) return;
      currentDetailRow = event.target.closest("tr");
      const cells = currentDetailRow.children;
      const slug = cells[1].textContent.trim();
      currentDetailSlug = slug;
      const memberText = cells[3].textContent.trim();
      const seatLimit = memberText.split("/")[1]?.trim() || "0";
      const teamName = cells[0].querySelector("strong").textContent;
      const remark = currentDetailRow.dataset.remark || "";
      detailFields.nameText.textContent = teamName;
      detailFields.nameInput.value = teamName;
      detailFields.remarkText.textContent = remark;
      detailFields.remarkInput.value = remark;
      detailFields.slug.textContent = slug;
      detailFields.adminAccountText.textContent = adminAccounts[slug] || cells[2].textContent.trim();
      detailFields.adminAccountInput.value = adminAccounts[slug] || cells[2].textContent.trim();
      detailFields.members.textContent = memberText;
      detailFields.seatLimitText.textContent = seatLimit;
      detailFields.seatLimitInput.value = seatLimit;
      detailFields.points.textContent = cells[4].textContent.trim();
      detailFields.createdAt.textContent = cells[5].textContent.trim();
      detailFields.status.textContent = cells[6].textContent.trim();
      renderMembers(slug);
      closeInlineEditors();
      showDetailDrawer();
    });

    saveDetail.addEventListener("click", () => {
      if (!currentDetailRow) return;
      const cells = currentDetailRow.children;
      const usedSeats = cells[3].textContent.split("/")[0].trim();
      const nextName = detailFields.nameInput.value.trim();
      const nextSeatLimit = detailFields.seatLimitInput.value.trim();
      const nextAdminAccount = detailFields.adminAccountInput.value.trim();
      const nextRemark = detailFields.remarkInput.value.trim();
      cells[0].querySelector("strong").textContent = nextName;
      currentDetailRow.dataset.remark = nextRemark;
      cells[2].textContent = nextAdminAccount;
      cells[3].textContent = `${usedSeats} / ${nextSeatLimit}`;
      adminAccounts[currentDetailSlug] = nextAdminAccount;
      detailFields.nameText.textContent = nextName;
      detailFields.seatLimitText.textContent = nextSeatLimit;
      detailFields.adminAccountText.textContent = nextAdminAccount;
      detailFields.remarkText.textContent = nextRemark;
      detailFields.members.textContent = cells[3].textContent;
      closeInlineEditors();
      toast.textContent = "团队信息已更新";
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    });

    form.addEventListener("submit", event => {
      event.preventDefault();
      const teamName = document.getElementById("teamName").value.trim();
      const slug = document.getElementById("teamSlug").value.trim();
      const seatLimit = document.getElementById("seatLimit").value.trim();
      const adminAccount = document.getElementById("adminAccount").value.trim();
      const createdAt = new Date().toISOString().slice(0, 10);
      teamMembers[slug] = [
        { name: adminAccount, joinedAt: createdAt, role: "管理员", id: `mem-${slug}-001` }
      ];
      adminAccounts[slug] = adminAccount;

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="team-name"><strong>${teamName}</strong></td>
        <td><span class="tag">${slug}</span></td>
        <td>${adminAccount}</td>
        <td>0 / ${seatLimit}</td>
        <td>0</td>
        <td>${createdAt}</td>
        <td><span class="tag green">启用中</span></td>
        <td><a class="link view-team">查看</a><a class="link copy-link">复制链接</a></td>
      `;
      tr.dataset.remark = document.getElementById("desc").value.trim();
      rows.prepend(tr);
      hideDrawer();
      showSuccessModal(adminAccount);
    });
  </script>
</body>
</html>

</template>

    .apps-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .apps-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .app-card {
      min-height: 220px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      padding: 20px;
      border: 1px solid rgba(232, 233, 240, .88);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(25, 30, 48, .05);
    }

    .app-name {
      margin: 0;
      color: var(--text);
      font-size: 16px;
      font-weight: 800;
    }

    .app-desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .app-card .btn {
      width: 100%;
    }

    .app-card.hidden {
      display: none;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 0 0 auto;
    }

    .btn {
      height: 40px;
      border-radius: 6px;
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 15px;
      color: #2f3440;
      background: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .btn svg {
      width: 17px;
      height: 17px;
    }

    .btn.primary {
      color: #fff;
      border-color: var(--brand);
      background: var(--brand);
      box-shadow: 0 8px 16px rgba(83, 104, 255, .22);
    }

    .btn.primary:hover {
      background: var(--brand-deep);
    }

    .btn[hidden] {
      display: none;
    }

    .btn.has-badge {
      position: relative;
    }

    .btn-badge {
      position: absolute;
      top: -7px;
      right: -7px;
      min-width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      border: 2px solid #fff;
      border-radius: 999px;
      background: var(--danger);
      color: #fff;
      font-size: 11px;
      line-height: 1;
      font-weight: 800;
    }

    .btn-badge[hidden] {
      display: none;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(232, 233, 240, .78);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .section {
      display: grid;
      gap: 18px;
      margin-bottom: 18px;
      animation: fade .16s ease-out;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel {
      overflow: hidden;
    }

    .panel-head {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 22px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .panel-subtitle {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .panel-body {
      padding: 22px;
    }

    .profile-page {
      display: grid;
      gap: 24px;
    }

    .profile-card {
      padding: 28px 34px;
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      border: 1px solid rgba(232, 233, 240, .78);
    }

    .profile-avatar-row {
      display: flex;
      justify-content: center;
      padding: 0 0 26px;
    }

    .profile-avatar-large {
      position: relative;
      width: 74px;
      height: 74px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #ffe5e4;
      box-shadow: inset 0 0 0 10px rgba(244, 245, 249, .72);
    }

    .profile-avatar-large::before {
      content: "";
      width: 44px;
      height: 34px;
      border-radius: 18px 18px 14px 14px;
      background: #ff4d5e;
      box-shadow: 0 8px 16px rgba(255, 77, 94, .22);
    }

    .camera-badge {
      position: absolute;
      right: -4px;
      bottom: 4px;
      width: 30px;
      height: 30px;
      border: 3px solid #fff;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--brand);
    }

    .camera-badge svg {
      width: 16px;
      height: 16px;
    }

    .profile-row {
      min-height: 78px;
      display: grid;
      grid-template-columns: 220px 1fr 90px;
      align-items: center;
      gap: 18px;
      border-top: 1px solid #eff0f4;
    }

    .profile-row:first-of-type {
      border-top: 0;
    }

    .profile-label {
      color: #80848f;
      font-size: 15px;
    }

    .profile-value {
      color: var(--text);
      font-size: 16px;
      font-weight: 650;
    }

    .profile-value.muted {
      color: #c2c6cf;
      font-weight: 500;
    }

    .profile-link {
      border: 0;
      background: transparent;
      color: var(--brand);
      cursor: pointer;
      font-weight: 750;
      text-align: right;
    }

    .profile-link.danger {
      color: var(--danger);
    }

    .profile-simple-row {
      min-height: 70px;
      display: grid;
      grid-template-columns: 220px 1fr 90px;
      align-items: center;
      gap: 18px;
    }

    .verified {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #10b981;
      font-weight: 750;
    }

    .verified svg {
      width: 16px;
      height: 16px;
    }

    .danger-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .account-icons {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .account-icon {
      width: 24px;
      height: 24px;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #b7bcc6;
    }

    .account-icon.bound {
      border-color: #dfe4ff;
      background: #f4f6ff;
      color: var(--brand);
    }

    .account-icon svg {
      width: 14px;
      height: 14px;
    }

    .basic-panel .panel-head {
      border-bottom: 0;
      min-height: 58px;
      padding-bottom: 0;
    }

    .basic-panel .panel-body {
      padding-top: 10px;
    }

    .auth-panel .panel-head {
      border-bottom: 0;
      min-height: 58px;
      padding-bottom: 0;
    }

    .auth-panel .panel-body {
      padding-top: 10px;
    }

    .members-panel .panel-head {
      border-bottom: 0;
      min-height: 58px;
      padding-bottom: 0;
    }

    .members-panel .panel-body {
      padding-top: 10px;
    }

    .basic-overview {
      display: grid;
      grid-template-columns: 1.2fr 1.4fr .8fr;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .basic-item {
      min-height: 76px;
      padding: 14px 18px;
      border-right: 1px solid var(--line);
      background: #fff;
    }

    .basic-item:last-child {
      border-right: 0;
    }

    .basic-label {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .basic-value {
      color: var(--text);
      font-size: 16px;
      line-height: 1.25;
      font-weight: 750;
      word-break: break-word;
    }

    .basic-value.large {
      font-size: 16px;
    }

    .auth-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .auth-row {
      min-height: 62px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .auth-row.configurable {
      cursor: pointer;
      transition: border-color .16s ease, box-shadow .16s ease;
    }

    .auth-row.configurable:hover {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(83, 104, 255, .08);
    }

    .auth-name {
      min-width: 0;
      color: var(--text);
      font-size: 16px;
      font-weight: 750;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .auth-status {
      color: #b8bdc7;
      font-size: 14px;
      white-space: nowrap;
      justify-self: end;
    }

    .auth-status.enabled {
      color: var(--brand);
      font-weight: 750;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 26px;
      padding: 0 9px;
      border-radius: 4px;
      color: #4b5563;
      background: #eef1f6;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .tag.green {
      color: #0f7a44;
      background: #e8f8ef;
    }

    .tag.orange {
      color: #9a5a00;
      background: #fff4df;
    }

    .permission-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .permission-tag {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 8px;
      border-radius: 4px;
      background: #f2f4ff;
      color: var(--brand);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .permission-more {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 8px;
      border-radius: 4px;
      background: #f3f4f6;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .app-permission-summary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      vertical-align: middle;
      white-space: nowrap;
    }

    .app-permission-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .app-permission-more {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      background: #eef2ff;
      color: var(--brand);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .member-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .toolbar-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .search {
      width: 300px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcff;
      color: var(--muted);
    }

    .search svg {
      width: 17px;
      height: 17px;
      color: var(--subtle);
    }

    .table-scroll {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .table-scroll table {
      min-width: 900px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      height: 50px;
      padding: 0 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      overflow-wrap: anywhere;
    }

    th {
      height: 44px;
      color: #4f5665;
      background: #fafbff;
      font-weight: 800;
      padding: 0 10px;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    .table-action {
      border: 0;
      background: transparent;
      color: var(--brand);
      cursor: pointer;
      font-weight: 750;
      padding: 0;
    }

    .table-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      position: relative;
    }

    .table-action.danger {
      color: var(--danger);
    }

    .table-action.success {
      color: var(--brand);
    }

    .more-btn {
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .more-btn:hover {
      background: #f3f4f6;
      color: var(--text);
    }

    .more-menu {
      position: absolute;
      right: 0;
      top: 30px;
      z-index: 12;
      min-width: 92px;
      display: none;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(20, 24, 36, .12);
    }

    .table-actions.open .more-menu {
      display: block;
    }

    .more-menu .table-action {
      width: 100%;
      height: 30px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      border-radius: 4px;
      text-align: left;
    }

    .more-menu .table-action:hover {
      background: #fff1f2;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding-top: 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .page-btn,
    .page-current {
      min-width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      background: #fff;
      color: #303642;
      font-weight: 700;
    }

    .page-btn {
      cursor: pointer;
    }

    .page-btn.disabled {
      color: #b8bdc7;
      cursor: not-allowed;
      background: #fafbff;
    }

    .page-current {
      border-color: var(--brand);
      color: #fff;
      background: var(--brand);
    }

    .page-size {
      height: 32px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: #303642;
      font-weight: 700;
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: rgba(20, 24, 36, .34);
    }

    .modal-mask.open {
      display: flex;
    }

    .modal {
      width: 560px;
      max-width: calc(100vw - 48px);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 22px 54px rgba(20, 24, 36, .22);
      overflow: hidden;
    }

    .approval-modal {
      width: 820px;
    }

    .approval-modal .table-scroll {
      overflow-x: hidden;
    }

    .approval-modal .table-scroll table {
      min-width: 0;
    }

    .approval-modal th,
    .approval-modal td {
      white-space: nowrap;
    }

    .approval-modal td:nth-child(2) {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .modal-head {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px 0 22px;
      border-bottom: 1px solid var(--line);
    }

    .modal-head h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .modal-title-side {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .modal-head-actions {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 22px;
    }

    .modal-body {
      display: grid;
      gap: 16px;
      padding: 22px;
    }

    .form-field {
      display: grid;
      gap: 8px;
    }

    .form-field label {
      color: #303642;
      font-size: 14px;
      font-weight: 750;
    }

    .form-field input,
    .form-field select {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      outline: 0;
      padding: 0 12px;
    }

    .form-field input:focus,
    .form-field select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(83, 104, 255, .12);
    }

    .readonly-value {
      min-height: 40px;
      display: flex;
      align-items: center;
      color: var(--text);
      font-weight: 750;
    }

    .copy-field {
      min-height: 40px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 0 10px 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcff;
    }

    .copy-value {
      min-width: 0;
      color: var(--text);
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copy-btn {
      border: 0;
      background: transparent;
      color: var(--brand);
      cursor: pointer;
      font-weight: 750;
      padding: 0;
    }

    .enable-switch {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 30px;
      padding: 0 6px 0 12px;
      border-radius: 6px;
      background: var(--brand);
      flex: 0 0 auto;
      cursor: pointer;
    }

    .enable-switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .enable-text {
      min-width: 28px;
      color: #fff;
      font-size: 14px;
      line-height: 1;
      font-weight: 750;
    }

    .enable-knob {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      background: #fff;
      box-shadow: 0 1px 2px rgba(20, 24, 36, .14);
    }

    .enable-switch:has(input:not(:checked)) {
      background: #d1d5db;
    }

    .enable-switch input:focus-visible ~ .enable-knob {
      box-shadow: 0 0 0 3px rgba(83, 104, 255, .2);
    }

    .enable-switch input:not(:checked) ~ .enable-text::before {
      content: "禁用";
    }

    .enable-switch input:not(:checked) ~ .enable-text {
      font-size: 0;
    }

    .enable-switch input:not(:checked) ~ .enable-text::before {
      font-size: 14px;
    }

    .enable-switch,
    .enable-knob {
      transition: background .16s ease;
    }

    .permission-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .permission-option {
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: #303642;
      font-weight: 650;
    }

    .permission-option input {
      width: 15px;
      height: 15px;
      accent-color: var(--brand);
    }

    .checkbox-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .checkbox-option {
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: #303642;
      font-weight: 650;
    }

    .checkbox-option input {
      width: 15px;
      height: 15px;
      accent-color: var(--brand);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 22px;
      border-top: 1px solid var(--line);
      background: #fbfcff;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .detail-item {
      min-height: 72px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .detail-item.full {
      grid-column: 1 / -1;
    }

    .detail-item.inline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 56px;
    }

    .detail-label {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .detail-item.inline .detail-label {
      margin-bottom: 0;
    }

    .detail-value {
      color: var(--text);
      font-weight: 750;
      word-break: break-word;
    }

    .detail-select {
      width: 160px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      outline: 0;
      padding: 0 10px;
      font: inherit;
      font-weight: 750;
      text-align: right;
    }

    .detail-select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(83, 104, 255, .12);
    }

    .toast {
      position: fixed;
      top: 96px;
      right: 32px;
      z-index: 30;
      min-width: 220px;

      <div class="modal-body">
        <div class="table-scroll">

            <thead>

                <th style="width: 18%;">用户名</th>

              <tr>

                <td>2026-05-11 19:34</td>
                <td>
                  <div class="table-actions">

  <script>
    const toast = document.getElementById("toast");
    const memberModal = document.getElementById("memberModal");
    const memberForm = document.getElementById("memberForm");
    const openMemberModal = document.getElementById("openMemberModal");
    const openApprovalModal = document.getElementById("openApprovalModal");
    const approvalBadge = document.getElementById("approvalBadge");
    const closeMemberModal = document.getElementById("closeMemberModal");
    const cancelMemberModal = document.getElementById("cancelMemberModal");
    const approvalModal = document.getElementById("approvalModal");
    const closeApprovalModal = document.getElementById("closeApprovalModal");
    const cancelApprovalModal = document.getElementById("cancelApprovalModal");
    const memberDetailModal = document.getElementById("memberDetailModal");
    const memberDetailForm = document.getElementById("memberDetailForm");
    const closeMemberDetailModal = document.getElementById("closeMemberDetailModal");
    const cancelMemberDetailModal = document.getElementById("cancelMemberDetailModal");
    const sendVerifyEmail = document.getElementById("sendVerifyEmail");
    const emailConfigEntry = document.getElementById("emailConfigEntry");
    const emailStatus = document.getElementById("emailStatus");
    const emailEnabled = document.getElementById("emailEnabled");
    const emailModal = document.getElementById("emailModal");
    const emailForm = document.getElementById("emailForm");
    const closeEmailModal = document.getElementById("closeEmailModal");
    const cancelEmailModal = document.getElementById("cancelEmailModal");
    const dingtalkConfigEntry = document.getElementById("dingtalkConfigEntry");
    const dingtalkStatus = document.getElementById("dingtalkStatus");
    const dingtalkEnabled = document.getElementById("dingtalkEnabled");
    const dingtalkModal = document.getElementById("dingtalkModal");
    const dingtalkForm = document.getElementById("dingtalkForm");
    const closeDingtalkModal = document.getElementById("closeDingtalkModal");
    const cancelDingtalkModal = document.getElementById("cancelDingtalkModal");
    const viewMenuItems = document.querySelectorAll("[data-view-target]");
    const pageViews = document.querySelectorAll(".page-view");
    let activeMemberRow = null;
    let toastTimer = 0;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function showMemberModal() {
      memberModal.classList.add("open");
      memberModal.setAttribute("aria-hidden", "false");
    }

    function hideMemberModal() {
      memberModal.classList.remove("open");
      memberModal.setAttribute("aria-hidden", "true");
    }

    function showApprovalModal() {
      approvalModal.classList.add("open");
      approvalModal.setAttribute("aria-hidden", "false");
    }

    function hideApprovalModal() {
      approvalModal.classList.remove("open");
      approvalModal.setAttribute("aria-hidden", "true");
    }

    function updateApprovalBadge() {
      const count = document.querySelectorAll("#approvalTableBody tr").length;
      approvalBadge.textContent = count;
      approvalBadge.hidden = count === 0;
    }

    function showMemberDetailModal(row) {
      const cells = row.children;
      activeMemberRow = row;
      document.getElementById("detailMemberName").textContent = cells[0].textContent.trim();
      document.getElementById("detailMemberEmail").textContent = row.dataset.email || "-";
      document.getElementById("detailMemberRole").value = cells[2].textContent.trim();
      setCheckedValues(document.getElementById("detailMemberAppPermissions"), getMemberAppPermissions(row));
      document.getElementById("detailMemberJoinedAt").textContent = row.dataset.joinedAt || "-";
      const status = cells[5].textContent.trim();
      document.getElementById("detailMemberStatus").textContent = status;
      sendVerifyEmail.hidden = status !== "待激活";
      memberDetailModal.classList.add("open");
      memberDetailModal.setAttribute("aria-hidden", "false");
    }

    function hideMemberDetailModal() {
      memberDetailModal.classList.remove("open");
      memberDetailModal.setAttribute("aria-hidden", "true");
      sendVerifyEmail.hidden = true;
    }

    function showEmailModal() {
      emailModal.classList.add("open");
      emailModal.setAttribute("aria-hidden", "false");
    }

    function hideEmailModal() {
      emailModal.classList.remove("open");
      emailModal.setAttribute("aria-hidden", "true");
    }

    function showDingtalkModal() {
      dingtalkModal.classList.add("open");
      dingtalkModal.setAttribute("aria-hidden", "false");
    }

    function hideDingtalkModal() {
      dingtalkModal.classList.remove("open");
      dingtalkModal.setAttribute("aria-hidden", "true");
    }

    function getCheckedValues(container) {
      return Array.from(container.querySelectorAll('input[type="checkbox"]:checked')).map(input => input.value);
    }

    function setCheckedValues(container, values) {
      const valueSet = new Set(values);
      container.querySelectorAll('input[type="checkbox"]').forEach(input => {
        input.checked = valueSet.has(input.value);
      });
    }

    function getMemberAppPermissions(row) {
      return (row.dataset.appPermissions || row.children[3].textContent)
        .split(/[,、]/)
        .map(permission => permission.trim())
        .filter(Boolean);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"]/g, character => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;"
      })[character]);
    }

    function formatAppPermissions(permissions) {
      return permissions.length ? permissions.join("、") : "-";
    }

    function renderAppPermissions(permissions) {
      const fullText = formatAppPermissions(permissions);
      const visibleText = permissions.length > 2 ? permissions.slice(0, 2).join("、") : fullText;
      const moreBadge = permissions.length > 2 ? `<span class="app-permission-more">+${permissions.length - 2}</span>` : "";
      return `<span class="app-permission-summary" title="${escapeHtml(fullText)}"><span class="app-permission-text">${escapeHtml(visibleText)}</span>${moreBadge}</span>`;
    }

    function renderAccountIcons(emailBound = true, dingtalkBound = false) {
      return `
        <span class="account-icons" aria-label="${emailBound ? "已绑定邮箱" : "未绑定邮箱"}，${dingtalkBound ? "已绑定钉钉" : "未绑定钉钉"}">
          <span class="account-icon${emailBound ? " bound" : ""}" title="${emailBound ? "已绑定邮箱" : "未绑定邮箱"}"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 6.5h16v11H4v-11Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="m5 8 7 5 7-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="account-icon${dingtalkBound ? " bound" : ""}" title="${dingtalkBound ? "已绑定钉钉" : "未绑定钉钉"}"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7.5 4.5 19 8.1l-4.2 11.4-3.1-5.2-5.6-2.1 5.3-1.8L7.5 4.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></span>
        </span>`;
    }

    viewMenuItems.forEach(item => {
      item.addEventListener("click", () => {
        const target = item.dataset.viewTarget;
        viewMenuItems.forEach(menuItem => menuItem.classList.toggle("active", menuItem === item));
        pageViews.forEach(view => view.classList.toggle("active", view.id === target));
      });
    });

    openMemberModal.addEventListener("click", showMemberModal);
    openApprovalModal.addEventListener("click", showApprovalModal);
    emailConfigEntry.addEventListener("click", showEmailModal);
    dingtalkConfigEntry.addEventListener("click", showDingtalkModal);
    closeMemberModal.addEventListener("click", hideMemberModal);
    cancelMemberModal.addEventListener("click", hideMemberModal);
    closeApprovalModal.addEventListener("click", hideApprovalModal);
    cancelApprovalModal.addEventListener("click", hideApprovalModal);
    closeEmailModal.addEventListener("click", hideEmailModal);
    cancelEmailModal.addEventListener("click", hideEmailModal);
    closeDingtalkModal.addEventListener("click", hideDingtalkModal);
    cancelDingtalkModal.addEventListener("click", hideDingtalkModal);
    memberModal.addEventListener("click", event => {
      if (event.target === memberModal) hideMemberModal();
    });
    approvalModal.addEventListener("click", event => {
      if (event.target === approvalModal) hideApprovalModal();
    });
    emailModal.addEventListener("click", event => {
      if (event.target === emailModal) hideEmailModal();
    });
    dingtalkModal.addEventListener("click", event => {
      if (event.target === dingtalkModal) hideDingtalkModal();
    });
    closeMemberDetailModal.addEventListener("click", hideMemberDetailModal);
    cancelMemberDetailModal.addEventListener("click", hideMemberDetailModal);
    sendVerifyEmail.addEventListener("click", () => {
      showToast("验证邮件已发送");
    });
    memberDetailModal.addEventListener("click", event => {
      if (event.target === memberDetailModal) hideMemberDetailModal();
    });

    memberForm.addEventListener("submit", event => {
      event.preventDefault();
      const name = document.getElementById("memberName").value;
      const email = document.getElementById("memberEmail").value;
      const role = document.getElementById("memberRole").value;
      const appPermissions = getCheckedValues(document.getElementById("memberAppPermissions"));
      const row = document.createElement("tr");
      row.dataset.joinedAt = "2026-05-12";
      row.dataset.appPermissions = appPermissions.join(",");
      row.dataset.email = email;
      row.innerHTML = `
        <td>${name}</td>
        <td>${renderAccountIcons(true, false)}</td>
        <td>${role}</td>
        <td>${renderAppPermissions(appPermissions)}</td>
        <td>-</td>
        <td><span class="tag orange">待激活</span></td>
        <td>
          <div class="table-actions">
            <button class="table-action view-member" type="button">查看</button>
            <button class="more-btn" type="button" aria-label="更多操作">···</button>
            <div class="more-menu">
              <button class="table-action danger delete-member" type="button">删除</button>
            </div>
          </div>
        </td>`;
      document.getElementById("memberTableBody").prepend(row);
      hideMemberModal();
      memberForm.reset();
      document.querySelectorAll("#memberAppPermissions input").forEach((input, index) => {
        input.checked = index < 2;
      });
      showToast("成员已添加，邀请邮件已发送");
    });

    emailForm.addEventListener("submit", event => {
      event.preventDefault();
      const isEnabled = emailEnabled.checked;
      emailStatus.textContent = isEnabled ? "已启用" : "未启用";
      emailStatus.classList.toggle("enabled", isEnabled);
      hideEmailModal();
      showToast("邮箱登录已保存");
    });

    dingtalkForm.addEventListener("submit", event => {
      event.preventDefault();
      const isEnabled = dingtalkEnabled.checked;
      dingtalkStatus.textContent = isEnabled ? "已启用" : "未启用";
      dingtalkStatus.classList.toggle("enabled", isEnabled);
      hideDingtalkModal();
      showToast("钉钉登录已保存");
    });

    memberDetailForm.addEventListener("submit", event => {
      event.preventDefault();
      if (!activeMemberRow) return;
      const role = document.getElementById("detailMemberRole").value;
      const appPermissions = getCheckedValues(document.getElementById("detailMemberAppPermissions"));
      activeMemberRow.children[2].textContent = role;
      activeMemberRow.children[3].innerHTML = renderAppPermissions(appPermissions);
      activeMemberRow.dataset.appPermissions = appPermissions.join(",");
      hideMemberDetailModal();
      showToast("成员信息已更新");
    });

    document.addEventListener("click", event => {
      const copyButton = event.target.closest(".copy-callback");
      if (copyButton) {
        const value = copyButton.dataset.copy;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(value).catch(() => {});
        }
        showToast("回调域名已复制");
        return;
      }

      const approveButton = event.target.closest(".approve-request");
      if (approveButton) {
        approveButton.closest("tr").remove();
        updateApprovalBadge();
        showToast("授权申请已通过");
        return;
      }

      const rejectButton = event.target.closest(".reject-request");
      if (rejectButton) {
        rejectButton.closest("tr").remove();
        updateApprovalBadge();
        showToast("授权申请已拒绝");
        return;
      }

      const deleteButton = event.target.closest(".delete-member");
      if (deleteButton) {
        deleteButton.closest("tr").remove();
        showToast("成员已删除");
        return;
      }

      const moreButton = event.target.closest(".more-btn");
      document.querySelectorAll(".table-actions.open").forEach(actions => {
        if (!moreButton || actions !== moreButton.closest(".table-actions")) {
          actions.classList.remove("open");
        }
      });
      if (moreButton) {
        moreButton.closest(".table-actions").classList.toggle("open");
        return;
      }

      const trigger = event.target.closest("[data-toast]");
      if (!trigger) return;
      showToast(trigger.dataset.toast);
    });

    document.addEventListener("click", event => {
      const viewButton = event.target.closest(".view-member");
      if (!viewButton) return;
      showMemberDetailModal(viewButton.closest("tr"));
    });

    updateApprovalBadge();
  </script>
</body>
</html>

</template>

  <script>
    const pageNames = {
      "login": "团队登录",
      "permission": "无权限申请",
      "team": "团队管理",
      "workbench": "工作台团队管理"
};
    const frame = document.querySelector("#previewFrame");
    const currentName = document.querySelector("#currentName");
    const buttons = Array.from(document.querySelectorAll(".switch-btn"));

    function showPage(pageId) {
      const template = document.querySelector("#tpl-" + pageId);
      if (!template) return;
      frame.srcdoc = template.innerHTML;
      currentName.textContent = "当前：" + pageNames[pageId];
      buttons.forEach((button) => {
        button.classList.toggle("active", button.dataset.page === pageId);
      });
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => showPage(button.dataset.page));
    });

    showPage("login");
  </script>
</body>
</html>
